<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阴间电台谜题服务 - 调试面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c8c8d0;font-family:'Courier New',monospace;min-height:100vh}
.header{background:linear-gradient(180deg,#1a1a2e 0%,#0a0a0f 100%);padding:20px 30px;border-bottom:1px solid #2a2a3e}
.header h1{font-size:22px;color:#e8475f;letter-spacing:4px}
.header p{font-size:12px;color:#6a6a7e;margin-top:4px;letter-spacing:1px}
.container{display:flex;min-height:calc(100vh - 80px)}
.left{width:420px;border-right:1px solid #2a2a3e;padding:16px;overflow-y:auto;background:#0e0e18}
.right{flex:1;padding:16px;overflow-y:auto;background:#0a0a0f}
.section{margin-bottom:18px}
.section-title{font-size:11px;color:#e8475f;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #1a1a2e;display:flex;justify-content:space-between;align-items:center}
.section-title .toggle{font-size:10px;color:#4a4a5e;cursor:pointer;border:1px solid #2a2a3e;padding:2px 6px}
label{display:block;font-size:11px;color:#8a8a9e;margin-bottom:3px;margin-top:7px}
input[type="text"],input[type="number"],select,textarea{width:100%;background:#12121e;border:1px solid #2a2a3e;color:#c8c8d0;padding:6px 10px;font-family:'Courier New',monospace;font-size:12px;border-radius:2px}
textarea{resize:vertical;min-height:48px}
select{cursor:pointer}
.btn{display:inline-block;padding:6px 14px;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;border:1px solid #e8475f;color:#e8475f;background:transparent;letter-spacing:1px;transition:all .2s;margin-top:10px;margin-right:6px;border-radius:2px}
.btn:hover{background:#e8475f;color:#0a0a0f}
.btn.secondary{border-color:#4a4a5e;color:#4a4a5e}
.btn.secondary:hover{background:#4a4a5e;color:#0a0a0f}
.btn.small{padding:4px 10px;font-size:10px;margin-top:4px}
.btn.warn{border-color:#c08030;color:#c08030}
.btn.warn:hover{background:#c08030;color:#0a0a0f}
.btn.danger{border-color:#c03040;color:#c03040}
.btn.danger:hover{background:#c03040;color:#0a0a0f}
.radio-group{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.radio-group label{display:inline-flex;align-items:center;gap:4px;margin:0;cursor:pointer;font-size:11px;padding:3px 7px;border:1px solid #2a2a3e;border-radius:2px;color:#8a8a9e}
.radio-group input[type="radio"]{width:auto;margin:0;accent-color:#e8475f}
.radio-group label:has(input:checked){border-color:#e8475f;color:#e8475f;background:#1a0a0e}
.result-box{background:#0e0e18;border:1px solid #2a2a3e;padding:14px;margin-bottom:14px;border-radius:2px;position:relative}
.result-box .tag{position:absolute;top:8px;right:10px;font-size:9px;padding:2px 6px;border:1px solid #2a2a3e;color:#6a6a7e;letter-spacing:1px;background:#0a0a0f}
.broadcast-text{white-space:pre-wrap;line-height:1.8;color:#8ab4f8;font-size:13px;letter-spacing:0.5px}
.clue-item{padding:7px 11px;margin:5px 0;border-left:2px solid #2a2a3e;background:#12121e;font-size:12px}
.clue-item.direct{border-left-color:#e8475f}
.clue-item.indirect{border-left-color:#f0a030}
.clue-item.environmental{border-left-color:#4a9eff}
.clue-type{font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.clue-direct{color:#e8475f}
.clue-indirect{color:#f0a030}
.clue-environmental{color:#4a9eff}
.feedback-item{padding:5px 11px;margin:4px 0;background:#1a0a0a;border-left:2px solid #5a2020;font-size:12px;color:#c07070}
.hook-text{padding:9px 12px;background:#0a1a0a;border-left:2px solid #20a050;font-size:12px;color:#70c090;line-height:1.6}
.answer-box{background:#1a0a1a;border:1px solid #3a1a3a;padding:9px 13px;font-size:13px;color:#e060c0;letter-spacing:1px}
.difficulty-info{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0}
.diff-tag{font-size:10px;padding:2px 7px;border:1px solid #2a2a3e;color:#8a8a9e;border-radius:2px}
.diff-tag.warn{border-color:#5a3a1a;color:#d09050}
.status-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:1px solid #2a2a3e;padding:5px 20px;font-size:10px;color:#4a4a5e;display:flex;justify-content:space-between;z-index:10}
.session-info{font-size:10px;color:#4a9eff;margin-top:4px}
.warning-box{background:#1a1a0a;border:1px solid #3a3a1a;padding:7px 11px;font-size:11px;color:#c0c070;margin:5px 0;border-radius:2px}
.adjustment-item{padding:4px 10px;margin:3px 0;background:#0f141a;border-left:2px solid #4a9eff;font-size:11px;color:#7ab0e0}
.adjustment-item .from{text-decoration:line-through;opacity:.5}
.adjustment-item .to{color:#70c090;font-weight:bold}
.spoiler-item{padding:5px 10px;margin:4px 0;background:#1a0f15;border-left:2px solid #c05080;font-size:11px}
.spoiler-original{color:#e070a0;text-decoration:line-through;opacity:.7}
.spoiler-replacement{color:#70c0a0;margin-left:6px}
.spoiler-count{float:right;font-size:10px;color:#6a6a7e}
.missed-item{padding:5px 10px;margin:4px 0;background:#101a10;border-left:2px solid #508040;font-size:11px;color:#80a070;opacity:.8}
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid #2a2a3e;flex-wrap:wrap}
.tab{padding:6px 14px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:#6a6a7e;font-family:'Courier New',monospace;background:transparent;border-top:none;border-left:none;border-right:none;letter-spacing:1px}
.tab.active{color:#e8475f;border-bottom-color:#e8475f}
.tab-content{display:none}
.tab-content.active{display:block}
.checkbox-row{display:flex;align-items:center;gap:6px;margin-top:7px}
.checkbox-row input[type="checkbox"]{width:auto;accent-color:#e8475f}
.checkbox-row label{margin:0;font-size:11px;cursor:pointer;color:#8a8a9e}
.draft-item{padding:9px 12px;margin:6px 0;background:#12121e;border:1px solid #2a2a3e;border-left:3px solid #4a4a5e;border-radius:2px;transition:all .15s}
.draft-item .row-main{display:flex;gap:8px;cursor:pointer}
.draft-item:hover{border-color:#e8475f;border-left-color:#e8475f;background:#1a1218}
.draft-item.draft{border-left-color:#4a4a5e}
.draft-item.adopted{border-left-color:#20a050}
.draft-item.archived{border-left-color:#5a5a6e;opacity:.7}
.draft-item.selected{border-color:#e8475f;background:#1a0a12}
.draft-title{font-size:12px;color:#c8c8d0;margin-bottom:3px}
.draft-meta{font-size:10px;color:#6a6a7e;display:flex;gap:8px;flex-wrap:wrap}
.draft-meta .status{padding:1px 5px;border:1px solid #2a2a3e;border-radius:2px}
.tier-tag{font-size:9px;padding:1px 5px;border-radius:2px;letter-spacing:1px}
.tier-easy{background:#0a2a0a;color:#50c070;border:1px solid #205030}
.tier-standard{background:#0a1a2a;color:#5090d0;border:1px solid #204060}
.tier-hard{background:#2a1a0a;color:#d09050;border:1px solid #503020}
.tier-nightmare{background:#2a0a0a;color:#d05050;border:1px solid #502020}
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.filter-row select,.filter-row input{flex:1;min-width:80px;padding:4px 8px;font-size:11px}
.empty-state{padding:30px;text-align:center;color:#4a4a5e;font-size:12px;letter-spacing:1px}
.spoiler-highlight{background:#2a1a1f;color:#e080a0;padding:0 3px;border-radius:2px}
.spoiler-highlight::after{content:"⚠";font-size:9px;margin-left:2px;vertical-align:super}
.sub-tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid #1a1a2e}
.sub-tab{padding:4px 10px;font-size:10px;cursor:pointer;border-bottom:2px solid transparent;color:#5a5a6e;font-family:'Courier New',monospace;background:transparent;border-top:none;border-left:none;border-right:none;letter-spacing:1px}
.sub-tab.active{color:#e8475f;border-bottom-color:#e8475f}
.help-text{font-size:10px;color:#5a5a6e;margin-top:4px;line-height:1.4}
.level-bar{display:flex;height:6px;margin-top:6px;border-radius:3px;overflow:hidden;background:#1a1a2e}
.level-bar .seg{flex:1;border-right:1px solid #0a0a0f;background:#1a1a2e}
.level-bar .seg.active{background:#e8475f}
.timeline{padding:10px 0 10px 20px;border-left:2px solid #1a1a2e;margin-left:10px}
.tl-item{position:relative;padding:10px 12px;margin-bottom:10px;background:#12121e;border:1px solid #2a2a3e;border-radius:2px;cursor:pointer;transition:all .15s}
.tl-item::before{content:"";position:absolute;left:-17px;top:15px;width:10px;height:10px;border-radius:50%;background:#4a4a5e;border:2px solid #1a1a2e}
.tl-item:hover{border-color:#e8475f;background:#1a1218}
.tl-item.active::before{background:#e8475f}
.tl-item.active{border-color:#e8475f}
.tl-item.gen::before{background:#4a9eff;border-color:#1a1a2e}
.tl-item.replay::before{background:#f0a030;border-color:#1a1a2e}
.tl-item.fail::before{background:#c03030;border-color:#1a1a2e}
.tl-item.reset::before{background:#707080;border-color:#1a1a2e}
.tl-type{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.tl-time{font-size:9px;color:#5a5a6e;float:right}
.tl-detail{font-size:11px;color:#8a8a9e;margin-top:4px;line-height:1.5}
.fc-delta{display:inline-block;padding:1px 5px;border-radius:2px;font-size:10px;margin-left:5px}
.fc-up{background:#2a0a0a;color:#e06060;border:1px solid #502020}
.fc-down{background:#0a2a0a;color:#60c060;border:1px solid #205020}
.tl-preview{margin-top:8px;padding:8px;background:#0a0a0f;border-left:2px solid #2a2a3e;font-size:11px;color:#8a8a9e;white-space:pre-wrap;line-height:1.5;max-height:80px;overflow:hidden}
.panel-toolbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.panel-toolbar .spacer{flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:10px}
.stat-card{padding:8px 10px;background:#12121e;border:1px solid #2a2a3e;border-radius:2px;text-align:center}
.stat-val{font-size:16px;color:#e8475f;letter-spacing:1px}
.stat-label{font-size:9px;color:#6a6a7e;margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.checkbox-select{width:16px;height:16px;accent-color:#e8475f;margin-top:2px}
.review-section{margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed #1a1a2e}
.review-section:last-child{border-bottom:none}
.review-title{font-size:11px;color:#e8475f;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.review-title .count{font-size:9px;color:#5a5a6e;letter-spacing:0}
.source-badge{font-size:9px;padding:1px 4px;border:1px solid #2a2a3e;margin-right:3px;border-radius:2px;color:#5a5a6e}
.source-badge.hot{border-color:#c05080;color:#c080a0;background:#1a0f15}
.rate-stars{display:inline-flex;gap:2px;cursor:pointer}
.rate-stars .star{font-size:14px;color:#3a3a4a;transition:color .1s}
.rate-stars .star.on{color:#d09050}
.rate-stars:hover .star.on{color:#d0a060}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#0e0e18;border:1px solid #2a2a3e;border-radius:2px;max-width:900px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;width:100%}
.modal-header{padding:12px 16px;border-bottom:1px solid #2a2a3e;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:13px;color:#e8475f;letter-spacing:2px}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.close-btn{background:transparent;border:1px solid #4a4a5e;color:#4a4a5e;padding:2px 8px;font-size:11px;cursor:pointer;border-radius:2px;font-family:'Courier New',monospace}
.close-btn:hover{border-color:#e8475f;color:#e8475f}
.inline-row{display:flex;gap:6px;align-items:center}
.inline-row > *{flex:1}
.tiny{font-size:10px !important;padding:3px 6px !important;margin-top:0 !important}
.split-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:1100px){.split-cols{grid-template-columns:1fr}}
.badge{display:inline-block;font-size:9px;padding:1px 5px;border:1px solid #2a2a3e;border-radius:2px;margin-right:3px}
.badge.hot{border-color:#c05080;color:#c080a0;background:#1a0f15}
.badge.cold{border-color:#5080a0;color:#80b0d0;background:#0f151a}
.badge.warn{border-color:#c08030;color:#d09050;background:#1a140a}
.badge.ok{border-color:#20a050;color:#70c090;background:#0a1a0e}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:10px}
.compare-col{background:#0a0a10;border:1px solid #2a2a3e;padding:10px;border-radius:2px;overflow-y:auto;max-height:70vh}
.compare-col.selected{border-color:#20a050;background:#0a1510}
.compare-col.rejected{border-color:#605050;opacity:.6}
.compare-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed #1a1a2e}
.compare-title{font-size:11px;color:#c8c8d0;letter-spacing:1px}
.decision-btn{padding:3px 8px;font-size:10px;border:1px solid #2a2a3e;color:#6a6a7e;background:transparent;cursor:pointer;font-family:'Courier New',monospace;border-radius:2px;margin-left:3px}
.decision-btn.active-adopt{border-color:#20a050;color:#70c090;background:#0a1a0e}
.decision-btn.active-archive{border-color:#c08030;color:#d09050;background:#1a140a}
.empty-actions{margin-top:10px;display:flex;gap:6px;justify-content:center}
.event-card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.fc-badge{font-size:9px;padding:1px 5px;border:1px solid #3a3a5a;border-radius:2px;color:#8ab4f8;background:#0a1018}
.level-badge{font-size:9px;padding:1px 5px;border:1px solid #504060;border-radius:2px;color:#c090e0;background:#140a1a}
.consistency-warn{background:#1a0a0a;border:1px solid #503030;color:#d07070;padding:6px 10px;margin:6px 0;font-size:11px;border-radius:2px}
</style>
</head>
<body>
<div class="header">
<h1>☠ 阴间电台谜题服务</h1>
<p>UNDERWORLD RADIO PUZZLE SERVICE // DEBUG PANEL v2.0</p>
</div>

<div class="container">
<div class="left">
  <div class="section">
    <div class="section-title">📡 谜题请求</div>
    <label>章节ID</label>
    <input type="text" id="chapterId" value="ch02_hospital" placeholder="例: ch02_hospital">
    <label>当前地图</label>
    <input type="text" id="currentMap" value="医院西楼三层" placeholder="玩家所在的位置">
    <label>已获得物品（逗号分隔）</label>
    <textarea id="collectedItems" placeholder="例: 生锈钥匙, 旧照片, 日记残页">生锈的钥匙, 护士站日志, 损坏的门禁卡</textarea>
    <label>谜底类型</label>
    <div class="radio-group">
      <label><input type="radio" name="answerType" value="frequency" checked>频率</label>
      <label><input type="radio" name="answerType" value="date">日期</label>
      <label><input type="radio" name="answerType" value="name">人名</label>
      <label><input type="radio" name="answerType" value="direction">方位</label>
      <label><input type="radio" name="answerType" value="code">代码</label>
    </div>
    <label>禁止剧透信息（逗号分隔）</label>
    <textarea id="forbiddenInfo" placeholder="例: 张医生, 太平间深处的房间, 2005年火灾">张医生的真实身份, 太平间深处的房间, 2005年火灾, 最终BOSS</textarea>
  </div>

  <div class="section">
    <div class="section-title">⚙ 难度约束</div>
    <label>目标平台</label>
    <div class="radio-group">
      <label><input type="radio" name="platform" value="pc" checked>PC</label>
      <label><input type="radio" name="platform" value="console">主机</label>
      <label><input type="radio" name="platform" value="mobile">移动端</label>
    </div>
    <label>难度档（预设）</label>
    <div class="radio-group">
      <label><input type="radio" name="tier" value="easy">轻松</label>
      <label><input type="radio" name="tier" value="standard" checked>标准</label>
      <label><input type="radio" name="tier" value="hard">硬核</label>
      <label><input type="radio" name="tier" value="nightmare">噩梦</label>
    </div>
    <label>线索最少出现次数</label>
    <input type="number" id="minClueAppearances" min="1" max="6" value="2">
    <div class="checkbox-row">
      <input type="checkbox" id="allowReversePlayback">
      <label for="allowReversePlayback">允许倒放线索</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="requiresPenAndPaper">
      <label for="requiresPenAndPaper">需要纸笔记录</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="allowAudioOnly" checked>
      <label for="allowAudioOnly">允许纯音频谜题</label>
    </div>
    <label>最大子步骤数</label>
    <input type="number" id="maxSubSteps" min="1" max="8" value="3">
  </div>

  <div class="section">
    <div class="section-title">🎮 玩家状态适配</div>
    <label>会话ID（可选，留空不关联）</label>
    <div class="inline-row">
      <input type="text" id="sessionIdInput" placeholder="现有 sessionId">
      <button class="btn tiny secondary" onclick="createNewSession()">新建会话</button>
    </div>
    <div id="sessionInfo" class="session-info"></div>
    <label>失败次数（直接填则不读会话）</label>
    <input type="number" id="failureCountInput" min="0" max="20" value="0">
    <div class="level-bar" id="failLevelBar">
      <div class="seg active"></div>
      <div class="seg"></div>
      <div class="seg"></div>
      <div class="seg"></div>
    </div>
    <div id="adaptationInfo" style="font-size:10px;color:#6a6a7e;margin-top:4px">Lv 0 原始版本 · 无失败</div>
    <label>强制适配等级（调试用）</label>
    <select id="forceLevelSelect">
      <option value="">不强制</option>
      <option value="0">Lv0 原始</option>
      <option value="1">Lv1 微光</option>
      <option value="2">Lv2 回声</option>
      <option value="3">Lv3 余烬</option>
    </select>
    <button class="btn small" onclick="generatePuzzle()">▶ 生成谜题</button>
    <button class="btn small secondary" onclick="requestReplay()">↻ 请求重播</button>
    <button class="btn small secondary" onclick="reportFailure()">✗ 报告失败</button>
    <button class="btn small secondary" onclick="resetSession()">⟲ 重置会话</button>
  </div>
</div>

<div class="right">
<div class="tabs">
  <button class="tab active" data-tab="result" onclick="switchTab('result')">结果视图</button>
  <button class="tab" data-tab="drafts" onclick="switchTab('drafts')">草稿筛选池</button>
  <button class="tab" data-tab="timeline" onclick="switchTab('timeline')">会话时间线</button>
  <button class="tab" data-tab="raw" onclick="switchTab('raw')">原始JSON</button>
</div>

<div id="tab-result" class="tab-content active">
  <div id="draftDetail" style="display:none">
    <div class="result-box">
      <div class="tag">草稿详情</div>
      <div id="draftDetailContent"></div>
      <div style="margin-top:10px">
        <button class="btn small" onclick="saveCurrentDraft()">💾 另存副本</button>
        <button class="btn small secondary" onclick="adoptDraft()">✓ 标记已采用</button>
        <button class="btn small warn" onclick="archiveDraft()">▣ 归档</button>
        <button class="btn small danger" onclick="deleteDraft()">✕ 删除</button>
      </div>
    </div>
  </div>

  <div id="resultArea" style="display:none">
    <div class="result-box">
      <div class="tag" id="adaptationTag">Lv0 原始</div>
      <div style="font-size:11px;color:#6a6a7e;margin-bottom:8px">
        <span id="metaInfo"></span>
      </div>
      <div class="broadcast-text" id="broadcastText"></div>
    </div>

    <div class="result-box">
      <div class="tag" id="puzzleIdTag"></div>

<div id="toast" style="position:fixed;top:20px;right:20px;background:#1a1a2e;border:1px solid #e8475f;color:#e8475f;padding:8px 16px;font-size:12px;z-index:9999;display:none;border-radius:2px;letter-spacing:1px"></div>

<div class="status-bar">
  <span id="statusText">就绪</span>
  <span id="currentSessionLabel">无会话</span>
</div>

<script>
const BASE = '/api';
let currentResult = null;
let currentDraftId = null;
let currentSessionId = null;
let selectedDraftIds = new Set();
let currentTimelineId = null;
let answerVisible = false;
let currentReviewQueue = 'none';
let lastRenderedDraft = null;
let lastTimelineEvents = [];

const $ = id => document.getElementById(id);

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function updateStatus(msg) {
  $('statusText').textContent = msg + ' · ' + new Date().toLocaleTimeString('zh-CN');
}

function getRadioValue(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

async function apiCall(method, path, body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(BASE + path, opts);
    const data = await res.json();
    if (!res.ok) {
      updateStatus('❌ ' + (data.error || 'Error ' + res.status));
      return { ok: false, data };
    }
    return { ok: true, data };
  } catch (e) {
    updateStatus('❌ 网络错误: ' + e.message);
    return { ok: false, data: null };
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + name);
  });
  if (name === 'drafts') refreshDrafts();
  if (name === 'timeline') {
    if (currentSessionId) { $('timelineSessionId').value = currentSessionId; refreshTimeline(); }
  }
  if (name === 'raw' && currentResult) $('rawArea').textContent = JSON.stringify(currentResult, null, 2);
}

function updateAdaptationBar() {
  const fc = parseInt($('failureCountInput').value) || 0;
  const level = Math.min(3, Math.floor(fc / 2));
  const labels = ['原始', '微光', '回声', '余烬'];
  document.querySelectorAll('#failLevelBar .seg').forEach((s, i) => {
    s.classList.toggle('active', i <= level);
  });
  $('adaptationInfo').textContent = `Lv ${level} ${labels[level]}版本 · ${fc}次失败`;
}
$('failureCountInput').addEventListener('input', updateAdaptationBar);
updateAdaptationBar();

async function generatePuzzle() {
  updateStatus('正在生成谜题……');
  const sessionId = $('sessionIdInput').value.trim() || currentSessionId || undefined;

  const body = {
    chapterId: $('chapterId').value,
    currentMap: $('currentMap').value,
    collectedItems: $('collectedItems').value.split(',').map(s => s.trim()).filter(Boolean),
    answerType: getRadioValue('answerType'),
    forbiddenInfo: $('forbiddenInfo').value.split(',').map(s => s.trim()).filter(Boolean),
    platform: getRadioValue('platform'),
    difficulty: {
      tier: getRadioValue('tier'),
      minClueAppearances: parseInt($('minClueAppearances').value) || 2,
      allowReversePlayback: $('allowReversePlayback').checked,
      requiresPenAndPaper: $('requiresPenAndPaper').checked,
      allowAudioOnly: $('allowAudioOnly').checked,
      maxSubSteps: parseInt($('maxSubSteps').value) || 3,
      platform: getRadioValue('platform'),
    },
    playerState: {
      failureCount: parseInt($('failureCountInput').value) || 0,
    },
  };
  if (sessionId) body.sessionId = sessionId;
  const forceLevel = $('forceLevelSelect').value;
  if (forceLevel !== '') body.forceAdaptationLevel = parseInt(forceLevel);

  const { ok, data } = await apiCall('POST', '/puzzle/request', body);
  if (ok) {
    currentResult = data;
    answerVisible = false;
    if (data.sessionId) {
      currentSessionId = data.sessionId;
      $('sessionIdInput').value = currentSessionId;
      $('currentSessionLabel').textContent = '会话: ' + currentSessionId.slice(0, 8);
    }
    renderResult(data);
    $('resultArea').style.display = 'block';
    $('emptyResult').style.display = 'none';
    $('rawArea').textContent = JSON.stringify(data, null, 2);
    updateStatus('✅ 谜题已生成 (失败次数: ' + (data.failureCount || 0) + ')');
  }
}

async function requestReplay() {
  updateStatus('正在请求重播……');
  const sessionId = $('sessionIdInput').value.trim() || currentSessionId || undefined;
  const body = {
    sessionId,
    failureCount: parseInt($('failureCountInput').value) || undefined,
    forceLevel: $('forceLevelSelect').value !== '' ? parseInt($('forceLevelSelect').value) : undefined,
    puzzleRequest: {
      chapterId: $('chapterId').value,
      currentMap: $('currentMap').value,
      collectedItems: $('collectedItems').value.split(',').map(s => s.trim()).filter(Boolean),
      answerType: getRadioValue('answerType'),
      forbiddenInfo: $('forbiddenInfo').value.split(',').map(s => s.trim()).filter(Boolean),
    },
    difficulty: {
      platform: getRadioValue('platform'),
      tier: getRadioValue('tier'),
      minClueAppearances: parseInt($('minClueAppearances').value) || 2,
      allowReversePlayback: $('allowReversePlayback').checked,
      requiresPenAndPaper: $('requiresPenAndPaper').checked,
      allowAudioOnly: $('allowAudioOnly').checked,
      maxSubSteps: parseInt($('maxSubSteps').value) || 3,
    },
  };
  const { ok, data } = await apiCall('POST', '/adaptation/replay', body);
  if (ok) {
    currentResult = data;
    if (data.sessionId) {
      currentSessionId = data.sessionId;
      $('sessionIdInput').value = currentSessionId;
      $('currentSessionLabel').textContent = '会话: ' + currentSessionId.slice(0, 8);
    }
    $('failureCountInput').value = data.failureCount;
    updateAdaptationBar();
    renderResult(data);
    $('resultArea').style.display = 'block';
    $('emptyResult').style.display = 'none';
    $('rawArea').textContent = JSON.stringify(data, null, 2);
    updateStatus('✅ 重播已生成 · 来源: ' + data.failureSource + ' · Lv' + data.adaptationLevel);
  }
}

async function reportFailure() {
  const sessionId = $('sessionIdInput').value.trim() || currentSessionId || undefined;
  const body = {
    sessionId,
    currentFailureCount: parseInt($('failureCountInput').value) || 0,
  };
  const { ok, data } = await apiCall('POST', '/adaptation/report-failure', body);
  if (ok) {
    $('failureCountInput').value = data.failureCount;
    updateAdaptationBar();
    if (data.sessionId) {
      currentSessionId = data.sessionId;
      $('sessionIdInput').value = currentSessionId;
    }
    updateStatus('✅ 已报告失败 · 共 ' + data.failureCount + ' 次 · 下次重播: ' + data.nextReplayWillBe);
  }
}

async function verifyAnswer() {
  if (!currentResult) return;
  const answer = prompt('输入验证答案（谜底值）:', currentResult.answer?.value || '');
  if (answer == null) return;
  const body = {
    sessionId: currentSessionId,
    puzzleId: currentResult.puzzleId,
    answer,
    _correctAnswer: currentResult.answer,
  };
  const { ok, data } = await apiCall('POST', '/puzzle/verify', body);
  if (ok) {
    if (data.sessionId) {
      currentSessionId = data.sessionId;
      $('sessionIdInput').value = currentSessionId;
    }
    if (!data.correct) {
      $('failureCountInput').value = data.failureCount;
      updateAdaptationBar();
    }
    alert((data.correct ? '✅ 正确！\n' : '❌ 错误！\n') + data.message
      + (data.nextReplay ? '\n下次重播等级: ' + data.nextReplay.label : ''));
  }
}

async function createNewSession() {
  const chapter = prompt('章节ID:', $('chapterId').value);
  if (!chapter) return;
  const { ok, data } = await apiCall('POST', '/session', { chapterId: chapter });
  if (ok) {
    currentSessionId = data.sessionId;
    $('sessionIdInput').value = data.sessionId;
    $('currentSessionLabel').textContent = '会话: ' + data.sessionId.slice(0, 8);
    $('failureCountInput').value = 0;
    updateAdaptationBar();
    updateStatus('✅ 已创建会话 ' + data.sessionId.slice(0, 8));
  }
}

async function resetSession() {
  const sid = $('sessionIdInput').value.trim() || currentSessionId;
  if (!sid) { updateStatus('没有会话可重置'); return; }
  const { ok } = await apiCall('POST', '/session/' + sid + '/reset');
  if (ok) {
    $('failureCountInput').value = 0;
    updateAdaptationBar();
    updateStatus('✅ 会话已重置');
  }
}

function toggleAnswer() {
  answerVisible = !answerVisible;
  $('answerBox').style.display = answerVisible ? 'block' : 'none';
}

function renderResult(data) {
  $('adaptationTag').textContent = 'Lv' + (data.adaptation?.level ?? data.adaptationLevel ?? 0) + ' ' + (data.adaptation?.name || data.adaptationLabel || '');
  $('puzzleIdTag').textContent = data.puzzleId ? data.puzzleId.slice(0, 10) : '临时';
  $('platformTag').textContent = data.platform?.toUpperCase() || 'PC';

  const typeLabels = { frequency: '频率', date: '日期', name: '人名', direction: '方位', code: '代码' };
  const fc = data.failureCount ?? data.playerState?.failureCount ?? 0;
  $('metaInfo').textContent = [
    data.chapterId || '-',
    data.currentMap || '',
    typeLabels[data.answer?.type] || data.answer?.type || '',
    '平台: ' + (data.platform || 'pc'),
    '失败: ' + fc,
  ].filter(Boolean).join(' · ');

  const filteredItems = data.spoilerFilter?.filteredItems || [];
  let bcast = data.broadcast?.text || '';
  filteredItems.forEach(f => {
    const r = escHtml(f.replacement);
    const hl = `<span class="spoiler-highlight" title="${escHtml('原词: ' + f.original)}">${r}</span>`;
    bcast = bcast.split(f.replacement).join(hl);
  });
  $('broadcastText').innerHTML = bcast;

  const answer = data.answer;
  $('answerBox').innerHTML = answer ? `<strong>${answer.type || ''}</strong>: <code>${escHtml(answer.display || answer.value)}</code>` : '-';

  const clues = data.clues || [];
  $('cluesList').innerHTML = clues.map(c => {
    let txt = c.text || '';
    filteredItems.forEach(f => {
      const r = escHtml(f.replacement);
      const hl = `<span class="spoiler-highlight" title="${escHtml('原词: ' + f.original)}">${r}</span>`;
      txt = txt.split(f.replacement).join(hl);
    });
    const typeClass = `clue-${c.type || 'environmental'}`;
    return `<div class="clue-item ${c.type || 'environmental'}">
      <div class="clue-type ${typeClass}">${c.type || 'environmental'} ${c.repetitions > 1 ? '×' + c.repetitions : ''}</div>
      <div>${txt}</div>
    </div>`;
  }).join('');

  $('wrongFeedbackList').innerHTML = (data.wrongFeedback || []).map(f =>
    `<div class="feedback-item">${escHtml(f)}</div>`
  ).join('') || '<div style="color:#5a5a6e;font-size:11px">无</div>';

  let hk = data.successHook?.text || '';
  filteredItems.forEach(f => {
    const r = escHtml(f.replacement);
    const hl = `<span class="spoiler-highlight" title="${escHtml('原词: ' + f.original)}">${r}</span>`;
    hk = hk.split(f.replacement).join(hl);
  });
  $('successHookText').innerHTML = hk || '—';

  const adj = data.platformAdjustments || [];
  $('adjustmentCount').textContent = adj.length ? adj.length + ' 项调整' : '';
  $('adjustmentCount').classList.toggle('warn', adj.length > 0);
  $('platformAdjustments').innerHTML = adj.length ? adj.map(a => `
    <div class="adjustment-item">
      <strong>${escHtml(a.field)}</strong>:
      <span class="from">${escHtml(String(a.from))}</span> →
      <span class="to">${escHtml(String(a.to))}</span>
      <span style="float:right;font-size:10px;color:#5a5a6e">${escHtml(a.reason)}</span>
    </div>
  `).join('') : '<div style="color:#5a5a6e;font-size:11px">无调整 · 约束全部符合当前平台</div>';

  renderSpoilerReport(data);
}

function renderSpoilerReport(data) {
  const sf = data.spoilerFilter;
  const fr = sf?.fullReport;
  if (!sf || !sf.applied) {
    $('spoilerTag').textContent = '未启用';
    $('spoilerReportTag').textContent = '0';
    $('spoilerReport').innerHTML = '<div style="color:#5a5a6e;font-size:11px">未提供禁用词，未启用过滤</div>';
    return;
  }

  const total = fr?.totalForbidden || 0;
  const hit = fr?.totalHit || 0;
  const missed = fr?.totalMissed || 0;
  const replaced = fr?.totalReplacements || sf.totalReplacements || 0;

  $('spoilerTag').textContent = '共' + total + '条';
  $('spoilerReportTag').textContent = '命中' + hit + '/替换' + replaced + '处';
  $('spoilerReportTag').classList.remove('warn');
  if (missed > 0) $('spoilerReportTag').classList.add('warn');

  const catLabels = { person: '人物', place: '地点', event: '事件', thing: '物品', generic: '通用' };
  let html = `<div class="difficulty-info">
    <span class="diff-tag">禁用词总数: ${total}</span>
    <span class="diff-tag ok" style="border-color:#20a050;color:#70c090">命中过滤: ${hit}</span>
    ${missed ? `<span class="diff-tag warn">未命中: ${missed}</span>` : ''}
    <span class="diff-tag hot" style="border-color:#c05080;color:#c080a0">替换位置: ${replaced}</span>
  </div>`;

  if (fr?.bySource && Object.keys(fr.bySource).length) {
    html += '<div class="review-section"><div class="review-title">按位置分布</div><div style="font-size:11px">';
    Object.entries(fr.bySource).forEach(([src, info]) => {
      const s = info.totalScanned || info.hit?.length || 0;
      const cls = s ? 'hot' : 'cold';
      html += `<span class="source-badge ${cls}">${escHtml(src)} ${s}处</span>`;
    });
    html += '</div></div>';
  }

  if (fr?.hit && fr.hit.length) {
    html += '<div class="review-section"><div class="review-title">已命中过滤 <span class="count">' + fr.hit.length + ' 条</span></div>';
    fr.hit.forEach(h => {
      html += `<div class="spoiler-item">
        <span class="spoiler-count">×${h.occurrences || 1}</span>
        <span class="badge" style="border-color:#3a3a4a;color:#8a8a9e">${escHtml(catLabels[h.category] || h.category)}</span>
        <span class="spoiler-original">${escHtml(h.original)}</span>
        <span>→</span>
        <span class="spoiler-replacement">${escHtml(h.replacement)}</span>
        ${h.matchedSynonyms && h.matchedSynonyms.length ? `<div style="font-size:9px;color:#5a5a6e;margin-top:3px">匹配方式: ${h.matchedSynonyms.map(s => escHtml(s)).join(', ')}</div>` : ''}
        ${h.sources && h.sources.length ? `<div style="font-size:9px;color:#5a5a6e;margin-top:2px">出现于: ${h.sources.map(s => '<span class="source-badge hot">' + escHtml(s) + '</span>').join('')}</div>` : ''}
      </div>`;
    });
    html += '</div>';
  }

  if (fr?.missed && fr.missed.length) {
    html += '<div class="review-section"><div class="review-title" style="color:#d09050">未命中（未出现在本次生成结果中） <span class="count">' + fr.missed.length + ' 条</span></div>';
    fr.missed.forEach(m => {
      html += `<div class="missed-item">⚠ ${escHtml(m)}</div>`;
    });
    html += '</div>';
  } else if (!fr?.hit || !fr.hit.length) {
    html += '<div style="color:#5a5a6e;font-size:11px;padding:10px 0">本次生成结果未包含禁用内容</div>';
  }

  $('spoilerReport').innerHTML = html;
}

// ====== 草稿库 ======
function populateFilterSelects() {
  apiCall('GET', '/drafts/stats').then(r => {
    if (r.ok) {
      const stats = r.data;
      const saved = (() => { try { return JSON.parse(localStorage.getItem('drf_filters') || '{}'); } catch(e) { return {}; } })();

      const savedChapters = Object.keys(stats.byChapter || {}).filter(Boolean);
      if (saved.f_chapterId && !savedChapters.includes(saved.f_chapterId)) savedChapters.unshift(saved.f_chapterId);
      const chapSel = $('f_chapterId');
      chapSel.innerHTML = '<option value="">全部章节</option>' + savedChapters.map(k =>
        `<option value="${escHtml(k)}">${escHtml(k)} ${stats.byChapter && stats.byChapter[k] ? '(' + stats.byChapter[k] + ')' : '(历史值)'}</option>`).join('');

      const savedMaps = Object.keys(stats.byMap || {}).filter(Boolean);
      if (saved.f_map && !savedMaps.includes(saved.f_map)) savedMaps.unshift(saved.f_map);
      const mapSel = $('f_map');
      mapSel.innerHTML = '<option value="">全部地图</option>' + savedMaps.map(k =>
        `<option value="${escHtml(k)}">${escHtml(k)} ${stats.byMap && stats.byMap[k] ? '(' + stats.byMap[k] + ')' : '(历史值)'}</option>`).join('');
      renderStatsGrid(stats);
    }
  });
}

function renderStatsGrid(stats) {
  const cards = [
    ['总数', stats.total || 0],
    ['草稿中', stats.byStatus?.draft || 0],
    ['已采用', stats.byStatus?.adopted || 0],
    ['已归档', stats.byStatus?.archived || 0],
  ];
  if (stats.averageRating) cards.push(['评分', stats.averageRating + '★']);
  $('draftsStatsGrid').innerHTML = cards.map(([l, v]) =>
    `<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div>`
  ).join('');
}

function clearAllDraftFilters() {
  try { localStorage.removeItem('drf_filters'); } catch(e) {}
  ['f_chapterId','f_map','f_answerType','f_tier','f_platform','f_status','f_sortDir','draftsSearch'].forEach(i => $(i).value = '');
  $('f_sortBy').value = 'updatedAt';
  refreshDrafts();
}

function resetDraftFilters() {
  ['f_chapterId','f_map','f_answerType','f_tier','f_platform','f_status','f_sortDir','draftsSearch'].forEach(i => $(i).value = '');
  $('f_sortBy').value = 'updatedAt';
  refreshDrafts();
}

async function refreshDrafts() {
  populateFilterSelects();
  const params = new URLSearchParams();
  const map = {
    chapterId: 'f_chapterId',
    currentMap: 'f_map',
    answerType: 'f_answerType',
    difficultyTier: 'f_tier',
    platform: 'f_platform',
    status: 'f_status',
    sortBy: 'f_sortBy',
    sortDir: 'f_sortDir',
  };
  Object.entries(map).forEach(([k, id]) => {
    const v = $(id).value;
    if (v) params.append(k, v);
  });
  if (currentReviewQueue !== 'none') params.append('reviewQueue', currentReviewQueue);
  if ($('draftsSearch').value) params.append('search', $('draftsSearch').value);
  const qs = params.toString();
  const { ok, data } = await apiCall('GET', '/drafts' + (qs ? '?' + qs : ''));
  if (ok) {
    if (data.stats) {
      renderStatsGrid(data.stats);
      const rq = data.stats.byReviewQueue || {};
      $('rqCounts').textContent = `待复核 ${rq.pending_review || 0} · 已通过 ${rq.passed || 0} · 需重写 ${rq.needs_rewrite || 0}`;
    }
    renderDraftsList(data.drafts || []);
    saveDraftFilters();
  }
}

function debounceSearch() {
  clearTimeout(window._searchT);
  window._searchT = setTimeout(refreshDrafts, 300);
}

// ====== 评审队列 ======

    b.classList.toggle('active', b.dataset.rq === q);

async function setDraftReviewQueue(id, queue) {

}

async function batchSetReviewQueue(queue) {

async function addDraftReviewLog(id, action, decision, comment) {
  const reviewer = prompt('评审人姓名（可留空）:', '') || 'anonymous';
  const { ok } = await apiCall('POST', '/drafts/' + id + '/review-log', {

  });

function saveDraftFilters() {
  const state = {};
  ['f_chapterId','f_map','f_answerType','f_tier','f_platform','f_status','f_sortBy','f_sortDir','draftsSearch'].forEach(id => {
    state[id] = $(id).value;
  });
  state.reviewQueue = currentReviewQueue;
  try { localStorage.setItem('drf_filters', JSON.stringify(state)); } catch(e) {}
}

function loadDraftFilters() {
  try {
    const raw = localStorage.getItem('drf_filters');
    if (!raw) return;
    const state = JSON.parse(raw);
    Object.entries(state).forEach(([k, v]) => {
      if (k === 'reviewQueue') {
        currentReviewQueue = v || 'none';
        return;
      }
      if ($(k) && v != null) $(k).value = v;
    });
    document.querySelectorAll('#reviewQueueTabs .sub-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.rq === currentReviewQueue);
    });
  } catch(e) {}
}

    })(d.qualityRating);
    const rqTag = d.reviewQueue && d.reviewQueue !== 'none'
      ? `<span class="badge ${d.reviewQueue === 'passed' ? 'ok' : d.reviewQueue === 'needs_rewrite' ? 'warn' : 'cold'}">${escHtml(rqLabels[d.reviewQueue] || '')}</span>` : '';

    html += `<div class="draft-item ${d.status} ${isSel ? 'selected' : ''}">

            ${d.answerLength ? `<span class="badge">长${d.answerLength}</span>` : ''}
            ${d.reviewLogCount ? `<span class="badge cold">审${d.reviewLogCount}</span>` : ''}
            <span>${new Date(d.updatedAt).toLocaleString('zh-CN', { hour12: false })}</span>
          </div>
          <div style="font-size:10px;color:#5a5a6e;margin-top:4px;line-height:1.4;height:28px;overflow:hidden">${escHtml(d.broadcastPreview || '')}</div>
          ${d.tags && d.tags.length ? '<div style="margin-top:3px">' + d.tags.slice(0, 5).map(t => `<span class="diff-tag">${escHtml(t)}</span>`).join('') + '</div>' : ''}

  });

  updateSelectedCount();

function toggleSelect(id) {
  if (selectedDraftIds.has(id)) selectedDraftIds.delete(id);
  else if (selectedDraftIds.size < 3) selectedDraftIds.add(id);
  else { showToast('最多选 3 条对比', 'warn'); return; }
  updateSelectedCount();
  const el = document.querySelector(`.draft-item input[onclick*="'${id}'"]`);
  if (el) el.checked = selectedDraftIds.has(id);
  document.querySelectorAll('.draft-item').forEach(item => {
    const cb = item.querySelector('.checkbox-select');
    if (cb) {
      const oid = cb.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
      if (oid) item.classList.toggle('selected', selectedDraftIds.has(oid));
    }
  });
}

function updateSelectedCount() {
  const n = selectedDraftIds.size;
  $('selectedCount').textContent = n + ' 条已选';
  ['batchAdoptBtn','batchArchBtn','batchDelBtn'].forEach(id => $(id).disabled = n === 0);
  const cbtn = $('compareBtn');
  if (cbtn) {
    cbtn.disabled = n < 2 || n > 3;
    cbtn.textContent = `⇆ 对比 (${n}/3)`;
  }
}

async function rateDraft(id, rating) {
  const { ok } = await apiCall('PATCH', '/drafts/' + id + '/rate', { rating });
  if (ok) { updateStatus('已打分 ' + rating + '★'); refreshDrafts(); }
}

async function markStatus(id, status) {
  const statusLabels = { adopted: '采用', archived: '归档' };
  const comment = prompt('评审意见（可留空）:', '');
  await addDraftReviewLog(id, 'status_change', statusLabels[status] || status, comment || '');
  const { ok } = await apiCall('PATCH', '/drafts/' + id + '/status', { status });
  if (ok) { updateStatus('已更新状态'); refreshDrafts(); }
}

async function delDraft(id) {
  if (!confirm('确认删除这条草稿？')) return;
  const { ok } = await apiCall('DELETE', '/drafts/' + id);
  if (ok) { selectedDraftIds.delete(id); updateStatus('已删除'); refreshDrafts(); }
}

async function batchMark(status) {
  if (selectedDraftIds.size === 0) return;
  const { ok, data } = await apiCall('PATCH', '/drafts/batch/status', {
    draftIds: Array.from(selectedDraftIds), status,
  });
  if (ok) {
    updateStatus('✅ 已批量' + (status === 'adopted' ? '采用' : '归档') + ' ' + data.updatedCount + ' 条');

    refreshDrafts();

}

async function batchDeleteSelected() {
  if (selectedDraftIds.size === 0) return;
  if (!confirm('确认删除选中的 ' + selectedDraftIds.size + ' 条草稿？')) return;
  const { ok, data } = await apiCall('DELETE', '/drafts/batch', { draftIds: Array.from(selectedDraftIds) });
  if (ok) {
    updateStatus('✅ 已删除 ' + data.deletedCount + ' 条');
    selectedDraftIds.clear();
    refreshDrafts();

async function useDraftAsResult(id) {
  const { ok, data } = await apiCall('GET', '/drafts/' + id);
  if (ok) {

    currentResult = data;

async function saveCurrentDraft() {
  if (!currentResult) { updateStatus('先获取一个谜题结果'); return; }
  const snapshot = currentResult.draftSnapshot || currentResult;
  const body = {
    puzzleData: snapshot,
    meta: {
      chapterId: currentResult.chapterId || $('chapterId').value,
      currentMap: currentResult.currentMap || $('currentMap').value,
      answerType: currentResult.answer?.type,
      platform: currentResult.platform || getRadioValue('platform'),
      difficulty: currentResult.difficulty,
      adaptation: currentResult.adaptation,
      forbiddenInfo: $('forbiddenInfo').value.split(',').map(s => s.trim()).filter(Boolean),
      notes: '',
      platformAdjustments: currentResult.platformAdjustments || [],
      spoilerFilter: currentResult.spoilerFilter || {},
      difficultyTier: getRadioValue('tier'),
    },
  };
  const { ok, data } = await apiCall('POST', '/drafts', body);
  if (ok) {
    currentDraftId = data.draftId;
    updateStatus('✅ 已保存草稿 ID: ' + data.draftId.slice(0, 8));
    refreshDrafts();
  }
}

  if (ok) { updateStatus('已标记为已采用'); refreshDrafts(); }

async function archiveDraft() {
  if (!currentDraftId) return;
  const { ok } = await apiCall('PATCH', '/drafts/' + currentDraftId + '/status', { status: 'archived' });

}

async function deleteDraft() {
  if (!currentDraftId || !confirm('确认删除当前草稿？')) return;
  const { ok } = await apiCall('DELETE', '/drafts/' + currentDraftId);
  if (ok) {

  const sf = d.spoilerFilter;
  if (sf?.applied && sf.fullReport) {
    const fr = sf.fullReport;
    html += `<div class="review-section"><div class="review-title">🚫 剧透过滤报告
      <span class="count">命中${fr.totalHit}/${fr.totalForbidden}，替换${fr.totalReplacements}处</span></div>`;

    if (fr.bySource) {
      html += '<div style="font-size:10px;margin-bottom:6px">分布: ';
      Object.entries(fr.bySource).forEach(([src, info]) => {
        const c = info.totalScanned || info.hit?.length || 0;
        html += `<span class="badge ${c ? 'hot' : 'cold'}">${escHtml(src)} ${c}处</span>`;
      });
      html += '</div>';
    }

    if (fr.hit && fr.hit.length) {
      html += '<div style="margin-top:4px">';
      fr.hit.forEach(h => {
        html += `<div class="spoiler-item">
          <span class="spoiler-count">×${h.occurrences || 1}</span>
          <span class="diff-tag" style="color:#6a6a7e">${escHtml(catLabels[h.category] || h.category)}</span>
          <span class="spoiler-original">${escHtml(h.original)}</span>
          → <span class="spoiler-replacement">${escHtml(h.replacement)}</span>
          ${h.sources ? `<div style="font-size:9px;color:#5a5a6e;margin-top:2px">出现于: ${h.sources.map(s => '<span class="source-badge hot">' + escHtml(s) + '</span>').join('')}</div>` : ''}
          ${h.matchedSynonyms?.length ? `<div style="font-size:9px;color:#4a4a5e;margin-top:2px">匹配方式: ${h.matchedSynonyms.map(s => escHtml(s)).join(', ')}</div>` : ''}
        </div>`;
      });
      html += '</div>';
    }

    if (fr.missed?.length) {
      html += '<div style="margin-top:8px">';
      html += '<div style="font-size:10px;color:#d09050;margin-bottom:4px">未命中（本次未出现，无需替换）:</div>';
      fr.missed.forEach(m => html += `<div class="missed-item">${escHtml(m)}</div>`);
      html += '</div>';
    }
    html += '</div>';
  } else if (sf?.applied) {
    html += `<div class="review-section"><div class="review-title">🚫 剧透过滤 <span class="count">未出现在结果中</span></div>
      <div style="font-size:11px;color:#8a8a9e">启用过滤但禁用词未命中本次生成内容</div></div>`;
  }

  const rqLabels = { none: '无', pending_review: '📋 待复核', passed: '✅ 已通过', needs_rewrite: '✏️ 需重写' };
  html += `<div class="review-section"><div class="review-title">📎 元数据 · 评审队列: <span class="badge ${d.reviewQueue === 'passed' ? 'ok' : d.reviewQueue === 'needs_rewrite' ? 'warn' : d.reviewQueue === 'pending_review' ? 'cold' : ''}">${escHtml(rqLabels[d.reviewQueue] || '无')}</span></div>
    <div style="font-size:11px;color:#8a8a9e;line-height:1.8">
      <div>📅 创建: ${escHtml(d.createdAt || '-')}</div>
      <div>🔄 更新: ${escHtml(d.updatedAt || '-')}</div>
      <div>🏷 标签: ${d.tags?.length ? d.tags.map(t => `<span class="diff-tag">${escHtml(t)}</span>`).join(' ') : '无'}</div>
      <div>📝 备注: ${escHtml(d.notes || '无')}</div>
      <div>🧠 禁用词清单: ${d.forbiddenInfo?.length ? d.forbiddenInfo.map(t => `<span class="diff-tag warn">${escHtml(t)}</span>`).join(' ') : '无'}</div>
    </div></div>`;

  if (d.reviewLog && d.reviewLog.length) {
    html += `<div class="review-section"><div class="review-title">📝 评审记录 <span class="count">${d.reviewLog.length} 条</span></div>`;
    d.reviewLog.forEach(r => {
      html += `<div style="padding:5px 10px;margin:4px 0;background:#12121e;border-left:2px solid #4a9eff;font-size:11px">
        <div style="display:flex;justify-content:space-between">
          <span><strong>[${escHtml(r.action)}]</strong> ${escHtml(r.decision)}</span>
          <span style="color:#6a6a7e;font-size:9px">${escHtml(r.reviewer)} · ${new Date(r.timestamp).toLocaleString('zh-CN', { hour12: false })}</span>
        </div>
        ${r.comment ? `<div style="color:#8a8a9e;margin-top:3px">${escHtml(r.comment)}</div>` : ''}
      </div>`;
    });
    html += '</div>';
  }

  html += `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn" onclick="useDraftAsResult('${d.draftId}');closeDraftModal()">📥 载入结果</button>
    <button class="btn secondary" onclick="setDraftReviewQueue('${d.draftId}','pending_review');closeDraftModal()">📋 待复核</button>
    <button class="btn secondary" onclick="setDraftReviewQueue('${d.draftId}','passed');closeDraftModal()">✅ 已通过</button>
    <button class="btn secondary" onclick="setDraftReviewQueue('${d.draftId}','needs_rewrite');closeDraftModal()">✏️ 需重写</button>
    <button class="btn secondary" onclick="markStatus('${d.draftId}','adopted');closeDraftModal()">✓ 采用</button>
    <button class="btn warn" onclick="markStatus('${d.draftId}','archived');closeDraftModal()">▣ 归档</button>
    <button class="btn danger" onclick="if(confirm('删除？')){delDraft('${d.draftId}');closeDraftModal()}">✕ 删除</button>
  </div>`;

  $('draftModalBody').innerHTML = html;
}

// ====== Toast 工具 ======
function showToast(msg, type = 'ok') {
  const t = $('toast');
  t.textContent = msg;
  const colors = {
    ok: ['#20a050', '#70c090'],
    warn: ['#c08030', '#d09050'],
    error: ['#c03040', '#c07070'],
  };
  const [bc, fc] = colors[type] || colors.ok;
  t.style.borderColor = bc;
  t.style.color = fc;
  t.style.display = 'block';
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ====== 导出评审文本 ======
function buildReviewText(d) {
  const typeLabels = { frequency: '频率', date: '日期', name: '人名', direction: '方位', code: '代码' };
  const tierLabels = { easy: '轻松', standard: '标准', hard: '硬核', nightmare: '噩梦' };
  const statusLabels = { draft: '草稿', adopted: '已采用', archived: '已归档' };
  const platformLabels = { pc: 'PC', console: '主机', mobile: '移动端' };
  const catLabels = { person: '人物', place: '地点', event: '事件', thing: '物品', generic: '通用' };

  const rqLabels = { none: '无', pending_review: '待复核', passed: '已通过', needs_rewrite: '需重写' };
  const lines = [];
  lines.push('=== 阴间电台谜题 · 策划评审单 ===');
  lines.push('草稿 ID: ' + (d.draftId || '').slice(0, 10));
  lines.push('章节: ' + (d.chapterId || '-'));
  lines.push('地图: ' + (d.currentMap || '-'));
  lines.push('谜底类型: ' + (typeLabels[d.answerType] || d.answerType || '-'));
  lines.push('难度档: ' + (tierLabels[d.difficultyTier] || d.difficultyTier || '-'));
  lines.push('平台: ' + (platformLabels[d.platform] || d.platform));
  lines.push('状态: ' + (statusLabels[d.status] || d.status));
  lines.push('评审队列: ' + (rqLabels[d.reviewQueue] || d.reviewQueue || '无'));
  if (d.qualityRating) lines.push('质量评分: ' + '★'.repeat(d.qualityRating) + '☆'.repeat(5 - d.qualityRating));
  lines.push('创建: ' + (d.createdAt || '-'));
  lines.push('更新: ' + (d.updatedAt || '-'));
  lines.push('');
  lines.push('--- 谜底 ---');
  lines.push((typeLabels[d.answerType] || d.answerType) + ': ' + (d.answerDisplay || d.answer?.value || '-'));
  if (d.answerLength) lines.push('谜底长度: ' + d.answerLength);
  lines.push('');
  lines.push('--- 电台广播 ---');
  lines.push(d.broadcast?.text || '(无)');
  lines.push('');
  lines.push('--- 线索列表 ---');
  (d.clues || []).forEach((c, i) => {
    lines.push(`  ${i + 1}. [${c.type}] ${c.text || ''}`);
  });
  lines.push('');
  const adj = d.platformAdjustments || [];
  lines.push('--- 平台调整 (' + adj.length + ' 项) ---');
  if (adj.length) {
    adj.forEach(a => {
      lines.push(`  · ${a.field}: ${a.from} → ${a.to} (${a.reason})`);
    });
  } else {
    lines.push('  ✓ 全部约束符合当前平台');
  }
  lines.push('');
  const sf = d.spoilerFilter;
  const fr = sf?.fullReport;
  lines.push('--- 剧透过滤报告 ---');
  if (sf?.applied && fr) {
    lines.push(`  禁用词总数: ${fr.totalForbidden} / 命中: ${fr.totalHit} / 未命中: ${fr.totalMissed} / 替换处: ${fr.totalReplacements}`);
    if (fr.bySource && Object.keys(fr.bySource).length) {
      lines.push('  按位置分布: ' + Object.entries(fr.bySource).map(([s, info]) =>
        `${s} ${info.totalScanned || info.hit?.length || 0}处`).join(' | '));
    }
    if (fr.hit?.length) {
      lines.push('  已命中过滤:');
      fr.hit.forEach(h => {
        lines.push(`    · [${catLabels[h.category] || h.category}] "${h.original}" → "${h.replacement}"  ×${h.occurrences || 1}`);
        if (h.sources?.length) lines.push(`      出现于: ${h.sources.join(', ')}`);
        if (h.matchedSynonyms?.length) lines.push(`      匹配方式: ${h.matchedSynonyms.join(', ')}`);
      });
    }
    if (fr.missed?.length) {
      lines.push('  未命中（本次未出现）:');
      fr.missed.forEach(m => lines.push(`    ⚠ ${m}`));
    }
  } else if (sf?.applied) {
    lines.push('  启用过滤，但本次无命中');
  } else {
    lines.push('  未启用过滤（未提供禁用词）');
  }
  lines.push('');
  lines.push('--- 评审信息 ---');
  if (d.tags?.length) lines.push('标签: ' + d.tags.join(', '));
  if (d.notes) lines.push('备注: ' + d.notes);
  if (d.forbiddenInfo?.length) lines.push('禁用词清单: ' + d.forbiddenInfo.join(', '));
  if (d.reviewLog?.length) {
    lines.push('');
    lines.push('--- 评审记录 (' + d.reviewLog.length + ' 条) ---');
    d.reviewLog.forEach((r, i) => {
      lines.push(`  ${i + 1}. [${r.action}] ${r.decision} — ${r.reviewer} — ${r.timestamp}`);
      if (r.comment) lines.push(`     意见: ${r.comment}`);
    });
  }
  lines.push('');
  lines.push('=== 评审结束 ' + new Date().toLocaleString('zh-CN', { hour12: false }) + ' ===');
  return lines.join('\n');
}

async function copyReviewText() {
  if (!lastRenderedDraft) { showToast('无可复制的草稿', 'warn'); return; }
  const text = buildReviewText(lastRenderedDraft);
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    showToast('✅ 已复制评审文本到剪贴板');
  } catch (e) {
    showToast('复制失败: ' + e.message, 'error');
  }
}

// ====== 对比复核模式 ======
let compareDecisions = {};  // draftId -> 'adopt' | 'archive' | null
let loadedCompareDrafts = [];

async function openCompareModal() {
  if (selectedDraftIds.size < 2 || selectedDraftIds.size > 3) {
    showToast('请选择 2-3 条进行对比', 'warn'); return;
  }
  compareDecisions = {};
  loadedCompareDrafts = [];
  for (const id of selectedDraftIds) {
    const { ok, data } = await apiCall('GET', '/drafts/' + id);
    if (ok) { loadedCompareDrafts.push(data); compareDecisions[id] = null; }
  }
  renderCompareModal();
  $('compareModal').style.display = 'block';
}

function closeCompareModal() { $('compareModal').style.display = 'none'; }

function toggleCompareDecision(draftId, kind) {
  if (compareDecisions[draftId] === kind) compareDecisions[draftId] = null;
  else compareDecisions[draftId] = kind;
  renderCompareModal();
}

async function applyCompareDecisions() {
  const toAdopt = Object.entries(compareDecisions).filter(([_, v]) => v === 'adopt').map(([k]) => k);
  const toArchive = Object.entries(compareDecisions).filter(([_, v]) => v === 'archive').map(([k]) => k);
  const comment = prompt('本次对比复核的评审意见:', '') || '';
  let ok = true;
  for (const id of toAdopt) {
    await addDraftReviewLog(id, 'compare_adopt', '对比采用', comment);
  }
  for (const id of toArchive) {
    await addDraftReviewLog(id, 'compare_archive', '对比归档', comment);
  }
  if (toAdopt.length) {
    const r = await apiCall('PATCH', '/drafts/batch/status', { draftIds: toAdopt, status: 'adopted' });
    if (!r.ok) ok = false;
  }
  if (toArchive.length) {
    const r = await apiCall('PATCH', '/drafts/batch/status', { draftIds: toArchive, status: 'archived' });
    if (!r.ok) ok = false;
  }
  if (ok) {
    showToast(`✅ 已应用决策: 采用${toAdopt.length}条, 归档${toArchive.length}条`);
    selectedDraftIds.clear();
    closeCompareModal();
    refreshDrafts();
  } else {
    showToast('部分操作失败', 'error');
  }
}

function renderCompareModal() {
  const typeLabels = { frequency: '频率', date: '日期', name: '人名', direction: '方位', code: '代码' };
  const tierLabels = { easy: '轻松', standard: '标准', hard: '硬核', nightmare: '噩梦' };
  const catLabels = { person: '人物', place: '地点', event: '事件', thing: '物品', generic: '通用' };

  let html = '';

    a[c || 'none'] = (a[c || 'none'] || 0) + 1; return a;

  html += `<div style="font-size:11px;color:#8a8a9e;margin-bottom:10px;padding:6px 10px;background:#12121e;border-radius:2px">
    当前决策: 采用 <span style="color:#70c090">${counts.adopt || 0}</span> 条 · 归档 <span style="color:#d09050">${counts.archive || 0}</span> 条 · 待定 <span style="color:#6a6a7e">${counts.none || 0}</span> 条
  </div>`;

  html += '<div class="compare-grid">';
  loadedCompareDrafts.forEach(d => {
    const dec = compareDecisions[d.draftId] || null;
    const colCls = dec === 'adopt' ? 'selected' : (dec === 'archive' ? 'rejected' : '');
    html += `<div class="compare-col ${colCls}">
      <div class="compare-header">
        <div class="compare-title">
          <span class="tier-tag tier-${d.difficultyTier}">${escHtml(tierLabels[d.difficultyTier] || '-')}</span>
          ${escHtml(d.currentMap || '-')} · ${escHtml(typeLabels[d.answerType] || '-')}
        </div>
        <div>
          <button class="decision-btn ${dec === 'adopt' ? 'active-adopt' : ''}" onclick="toggleCompareDecision('${d.draftId}','adopt')">✓ 采用</button>
          <button class="decision-btn ${dec === 'archive' ? 'active-archive' : ''}" onclick="toggleCompareDecision('${d.draftId}','archive')">▣ 归档</button>
        </div>
      </div>
      <div style="font-size:10px;color:#5a5a6e;margin-bottom:6px">
        平台: ${escHtml(d.platform || '-')} · 长度: ${d.answerLength || 0} · 更新: ${new Date(d.updatedAt).toLocaleString('zh-CN', { hour12: false })}
        ${d.hasSpoilerFilter || d.spoilerFilter?.applied ? `<span class="badge hot" style="margin-left:6px">禁${d.spoilerReplacements || d.spoilerFilter?.fullReport?.totalReplacements || 0}</span>` : ''}
        ${d.platformAdjustments?.length || d.platformAdjustmentsCount ? `<span class="badge warn" style="margin-left:4px">调${d.platformAdjustments?.length || d.platformAdjustmentsCount || 0}</span>` : ''}
        ${d.qualityRating ? '<span style="margin-left:4px">★' + d.qualityRating + '</span>' : ''}
      </div>
      <div class="review-section"><div class="review-title">🎯 谜底</div>
        <div class="answer-box" style="font-size:12px;padding:6px 10px">${escHtml(d.answerDisplay || d.answer?.value || '')}</div></div>
      <div class="review-section"><div class="review-title">📡 广播</div>
        <div style="white-space:pre-wrap;line-height:1.7;font-size:11px;color:#8ab4f8;background:#0a0a0f;padding:8px;border-left:2px solid #4a9eff">${escHtml(d.broadcast?.text || '')}</div></div>
      <div class="review-section"><div class="review-title">🔍 线索 (${(d.clues || []).length})</div>
        ${(d.clues || []).map(c => `<div style="padding:4px 8px;margin:3px 0;font-size:10px;background:#12121e;border-left:2px solid #2a2a3e">
          <span class="clue-${c.type || 'environmental'}" style="font-size:9px;letter-spacing:1px;text-transform:uppercase">[${c.type || ''}]</span>
          ${escHtml((c.text || '').substring(0, 80))}${(c.text || '').length > 80 ? '...' : ''}
        </div>`).join('')}
      </div>`;

    const sf = d.spoilerFilter;
    const fr = sf?.fullReport;
    if (sf?.applied && fr) {
      html += `<div class="review-section"><div class="review-title">🚫 过滤 (命${fr.totalHit}/${fr.totalForbidden})</div>`;
      if (fr.hit?.length) {
        fr.hit.slice(0, 5).forEach(h => {
          html += `<div style="font-size:10px;padding:3px 6px;margin:2px 0;background:#1a0f15;border-left:2px solid #c05080">
            <span style="color:#e070a0;text-decoration:line-through">${escHtml(h.original)}</span> →
            <span style="color:#70c0a0">${escHtml(h.replacement)}</span>
            <span style="float:right;color:#6a6a7e">×${h.occurrences || 1}</span>
          </div>`;
        });
        if (fr.hit.length > 5) html += `<div style="font-size:9px;color:#6a6a7e;margin-top:2px">…还有${fr.hit.length - 5}条</div>`;
      } else {
        html += `<div style="font-size:10px;color:#80a070">无替换（所有禁用词未命中）</div>`;
      }
      if (fr.missed?.length) {
        html += `<div style="font-size:9px;color:#d09050;margin-top:3px">未命中 ${fr.missed.length} 条</div>`;
      }
      html += '</div>';
    }

    const adj = d.platformAdjustments || [];
    if (adj.length) {
      html += `<div class="review-section"><div class="review-title">⚙ 平台调整 (${adj.length})</div>`;
      adj.slice(0, 5).forEach(a => {
        html += `<div style="font-size:10px;padding:3px 6px;margin:2px 0;background:#0f141a;border-left:2px solid #4a9eff">
          <strong>${escHtml(a.field)}</strong>: <span style="text-decoration:line-through;opacity:.5">${escHtml(String(a.from))}</span> →
          <span style="color:#70c090">${escHtml(String(a.to))}</span>
          <span style="float:right;color:#6a6a7e">${escHtml(a.reason || '')}</span>
        </div>`;
      });
      if (adj.length > 5) html += `<div style="font-size:9px;color:#6a6a7e">…还有${adj.length - 5}项</div>`;
      html += '</div>';
    }

    html += `<div style="margin-top:6px;display:flex;gap:4px;justify-content:flex-end">
        <button class="decision-btn" onclick="event.stopPropagation();useDraftAsResult('${d.draftId}');closeCompareModal()">📥 载入</button>
        <button class="decision-btn" onclick="event.stopPropagation();lastRenderedDraft=findCompare('${d.draftId}');copyReviewText()">📋 评审单</button>
      </div>
    </div>`;
  });
  html += '</div>';
  $('compareBody').innerHTML = html;
}

function findCompare(id) { return loadedCompareDrafts.find(x => x.draftId === id); }

// ====== 时间线复盘导出 ======
function buildTimelineExportText(events, sessionInfo) {
  const typeLabels = {
    session_created: '创建会话',
    puzzle_generated: '生成谜题',
    replay_requested: '请求重播',
    attempt_recorded: '答案尝试',
    failure_reported: '报告失败',
    player_state_updated: '玩家状态更新',
    session_reset: '重置会话',
  };
  const levelLabels = ['原始 (Lv0)', '微光 (Lv1)', '回声 (Lv2)', '余烬 (Lv3)'];

  const lines = [];
  lines.push('=== 阴间电台 · 调试复盘报告 ===');
  lines.push('会话ID: ' + (sessionInfo?.sessionId || '').slice(0, 10));
  lines.push('章节: ' + (sessionInfo?.chapterId || '-'));
  lines.push('导出时间: ' + new Date().toLocaleString('zh-CN', { hour12: false }));
  lines.push('');

  let prevFC = null;
  events.forEach((ev, i) => {
    const fc = ev.failureCount ?? ev.afterFailure ?? ev.failureCountAtGen ?? null;
    const level = fc != null ? Math.min(3, Math.floor(fc / 2)) : null;
    const ts = new Date(ev.timestamp).toLocaleString('zh-CN', { hour12: false });
    const label = typeLabels[ev.type] || ev.type;

    lines.push(`--- #${i + 1} ${label} [${ts}] ---`);

    if (fc != null) {
      lines.push(`  失败次数: ${fc}` + (prevFC != null && fc !== prevFC ? ` (之前 ${prevFC}, 变化 ${fc > prevFC ? '+' : ''}${fc - prevFC})` : ''));
      lines.push(`  适配等级: ${levelLabels[level] || 'Lv' + level}`);
    }

    if (ev.type === 'session_created') {
      lines.push(`  章节: ${ev.chapterId || '-'}`);
    } else if (ev.type === 'puzzle_generated') {
      lines.push(`  谜题 #${(ev.puzzleIndex ?? 0) + 1} · 类型: ${ev.answerType || '-'} · 平台: ${ev.platform || '-'}`);
      if (ev.broadcastSnapshot?.text) {
        lines.push(`  广播: ${ev.broadcastSnapshot.text.slice(0, 200)}`);
      }
    } else if (ev.type === 'replay_requested') {
      lines.push(`  谜题 #${(ev.puzzleIndex ?? 0) + 1} · 适配 Lv${ev.adaptationLevel ?? 0}`);
      if (ev.replayBroadcast?.text) {
        lines.push(`  重播广播: ${ev.replayBroadcast.text.slice(0, 200)}`);
      }
    } else if (ev.type === 'attempt_recorded') {
      lines.push(`  谜题 #${(ev.puzzleIndex ?? 0) + 1} · 结果: ${ev.correct ? '✅ 正确' : '❌ 错误'}`);
      lines.push(`  答案: ${JSON.stringify(ev.answer)}`);
    } else if (ev.type === 'failure_reported') {
      lines.push(`  ${ev.beforeFailure} → ${ev.afterFailure} (+${ev.delta || 1})`);
      lines.push(`  原因: ${ev.reason || 'manual'}`);
    } else if (ev.type === 'session_reset') {
      lines.push(`  失败次数 ${ev.beforeFailure} → ${ev.afterFailure || 0}`);
    }

    lines.push('');
    prevFC = fc;
  });

  if (sessionInfo?.playerState) {
    lines.push('--- 会话最终状态 ---');
    lines.push(`  当前失败次数: ${sessionInfo.playerState.failureCount || 0}`);
    const fl = Math.min(3, Math.floor((sessionInfo.playerState.failureCount || 0) / 2));
    lines.push(`  适配等级: ${levelLabels[fl]}`);
    lines.push(`  谜题数: ${sessionInfo.puzzles?.length || 0}`);
  }

  lines.push('');
  lines.push('=== 复盘结束 ===');
  return lines.join('\n');
}

async function exportTimelineText() {
  const sid = $('timelineSessionId').value.trim() || currentSessionId;
  if (!sid) { showToast('请先选择会话', 'warn'); return; }
  const { ok: okTl, data: tlData } = await apiCall('GET', '/session/' + sid + '/timeline');
  const { ok: okInfo, data: sessionInfo } = await apiCall('GET', '/session/' + sid);
  if (!okTl) { showToast('获取时间线失败', 'error'); return; }
  const text = buildTimelineExportText(tlData.timeline || [], okInfo ? sessionInfo : null);
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    showToast('✅ 已复制复盘文本到剪贴板');
  } catch (e) {
    showToast('复制失败: ' + e.message, 'error');
  }
}

// ====== 会话时间线 ======
async function refreshTimeline() {
  const sid = $('timelineSessionId').value.trim() || currentSessionId;
  if (!sid) { updateStatus('请先填写或创建会话ID'); return; }
  $('timelineSessionId').value = sid;
  const { ok, data } = await apiCall('GET', '/session/' + sid + '/timeline');
  if (!ok) return;
  renderTimeline(data.timeline || [], data.sessionId);
  const info = (await apiCall('GET', '/session/' + sid));
  if (info.ok) {
    $('timelineStats').textContent = `会话 ${sid.slice(0, 8)}… · 当前失败 ${info.data.playerState?.failureCount || 0} · ${info.data.puzzles?.length || 0} 个谜题 · ${data.timeline.length} 条事件`;
  }
}

function renderTimeline(events, sid) {
  if (!events.length) {
    $('timelineEmpty').style.display = 'block';
    $('timelineContainer').style.display = 'none';
    return;
  }
  $('timelineEmpty').style.display = 'none';
  $('timelineContainer').style.display = 'grid';

  const typeLabels = {
    session_created: ['创建会话', ''],
    puzzle_generated: ['生成谜题', 'gen'],
    replay_requested: ['请求重播', 'replay'],
    attempt_recorded: ['答案尝试', 'fail'],
    failure_reported: ['报告失败', 'fail'],
    player_state_updated: ['玩家状态更新', ''],
    session_reset: ['重置会话', 'reset'],
  };

  // 一致性检查（相邻事件的失败次数变化）
  const consistencyIssues = [];
  for (let i = 1; i < events.length; i++) {
    const prev = events[i - 1], cur = events[i];
    const prevFC = prev.failureCount ?? prev.afterFailure ?? prev.failureCountAtGen ?? null;
    const curFC = cur.failureCount ?? cur.afterFailure ?? cur.failureCountAtGen ?? null;
    if (prevFC != null && curFC != null) {
      // 允许的变化：reset→0, failure→+1, attempt失败→+1, 其他相等
      if (cur.type === 'session_reset') {
        if (curFC !== 0) consistencyIssues.push({ at: i, msg: '重置后失败次数应为 0，实际是 ' + curFC });
      } else if (cur.type === 'failure_reported' || (cur.type === 'attempt_recorded' && !cur.correct)) {
        const delta = (cur.deltaFailure ?? cur.delta ?? 1);
        if (curFC !== prevFC + delta && curFC !== prevFC + 1) {
          consistencyIssues.push({ at: i, msg: `${cur.type} 失败次数变化异常: 期望 ${prevFC}+${delta || 1} → ${prevFC + (delta || 1)}, 实际 ${prevFC} → ${curFC}` });
        }
      } else if (cur.type === 'puzzle_generated') {
        if (curFC !== prevFC) consistencyIssues.push({ at: i, msg: `生成谜题未继承上一状态的失败次数: 上一${prevFC}, 现在${curFC}` });
      }
    }
  }

  const html = events.map((ev, idx) => {
    const [label, cls] = typeLabels[ev.type] || [ev.type, ''];
    let detail = '';
    let preview = '';
    let fcBadge = '';
    let levelBadge = '';
    const issue = consistencyIssues.find(x => x.at === idx);
    const prevFC = idx > 0 ? (events[idx - 1].failureCount ?? events[idx - 1].afterFailure ?? events[idx - 1].failureCountAtGen ?? null) : null;
    const curFC = ev.failureCount ?? ev.afterFailure ?? ev.failureCountAtGen ?? null;

    if (ev.type === 'puzzle_generated') {
      detail = `第 #${(ev.puzzleIndex ?? 0) + 1} 个谜题 · ${ev.answerType || ''} · ${ev.platform || ''}`;
      fcBadge = `<span class="fc-badge">失败 ${ev.failureCountAtGen ?? 0}</span>`;
      levelBadge = `<span class="level-badge">适配 Lv${ev.adaptationLevel ?? 0} ${escHtml(ev.adaptationName || '')}</span>`;
      if (ev.broadcastSnapshot) preview = (ev.broadcastSnapshot.text || '').slice(0, 100);
    } else if (ev.type === 'replay_requested') {
      detail = `谜题 #${(ev.puzzleIndex ?? 0) + 1}`;
      fcBadge = `<span class="fc-badge">失败 ${ev.failureCount ?? 0}</span>`;
      levelBadge = `<span class="level-badge">适配 Lv${ev.adaptationLevel ?? 0}</span>`;
      if (ev.replayBroadcast) preview = (ev.replayBroadcast.text || '').slice(0, 100);
    } else if (ev.type === 'attempt_recorded') {
      detail = `谜题 #${(ev.puzzleIndex ?? 0) + 1} · ${ev.correct ? '<span style="color:#70c090">✅ 正确</span>' : '<span style="color:#e07070">❌ 错误</span>'}
答案: ${JSON.stringify(ev.answer)}`;
      if (!ev.correct) {
        fcBadge = `<span class="fc-badge">失败 ${ev.afterFailure ?? 0}</span>`;
        if (ev.deltaFailure) detail += `<span class="fc-delta fc-up">+${ev.deltaFailure}</span>`;
      } else {
        fcBadge = `<span class="fc-badge" style="color:#70c090;border-color:#205030;background:#0a1a0e">成功 (${ev.afterFailure ?? 0})</span>`;
      }
    } else if (ev.type === 'failure_reported') {
      detail = `<span style="color:#e07070">失败</span>: ${ev.beforeFailure} → ${ev.afterFailure}
<span class="fc-delta fc-up">+${ev.delta || 1}</span>
原因: ${ev.reason || 'manual'}`;
      fcBadge = `<span class="fc-badge" style="color:#e0a0a0;border-color:#503030;background:#1a0a0a">失败 ${ev.afterFailure}</span>`;
    } else if (ev.type === 'player_state_updated') {
      detail = `失败次数 ${ev.beforeFailure} → ${ev.afterFailure}`;
      fcBadge = `<span class="fc-badge">失败 ${ev.afterFailure}</span>`;
    } else if (ev.type === 'session_created') {
      detail = `章节: ${ev.chapterId || '-'}`;
      fcBadge = `<span class="fc-badge" style="color:#70c090;border-color:#205030;background:#0a1a0e">失败 0</span>`;
    } else if (ev.type === 'session_reset') {
      detail = `重置失败次数: ${ev.beforeFailure} → ${ev.afterFailure || 0}`;
      fcBadge = `<span class="fc-badge" style="color:#70c090;border-color:#205030;background:#0a1a0e">失败 ${ev.afterFailure || 0}</span>`;
    }

    return `<div class="tl-item ${cls} ${currentTimelineId === ev.id ? 'active' : ''}" onclick="showTimelineEvent('${ev.id}', this)">
      ${issue ? `<div class="consistency-warn" style="margin:0 0 6px 0">⚠ ${escHtml(issue.msg)}</div>` : ''}
      <div>
        <span class="tl-type">${label}</span>
        <span class="tl-time">${new Date(ev.timestamp).toLocaleTimeString('zh-CN', { hour12: false })}</span>
      </div>
      <div class="event-card-meta">
        ${fcBadge}
        ${levelBadge}
        ${prevFC != null && curFC != null && curFC !== prevFC ? `<span class="fc-delta ${curFC > prevFC ? 'fc-up' : 'fc-down'}">${curFC > prevFC ? '+' : ''}${curFC - prevFC}</span>` : ''}
      </div>
      <div class="tl-detail" style="margin-top:6px">${detail}</div>
      ${preview ? `<div class="tl-preview">📻 ${escHtml(preview)}…</div>` : ''}
    </div>`;
  }).join('');

  $('timelineList').innerHTML = html;

  // 顶部一致性汇总
  const topWarn = $('timelineStats');
  const origTxt = topWarn.getAttribute('data-basetext') || topWarn.textContent;
  if (consistencyIssues.length > 0) {
    topWarn.innerHTML = (topWarn.getAttribute('data-basetext') || topWarn.textContent) +
      ` · <span style="color:#c07070">⚠ ${consistencyIssues.length} 处一致性警告</span>`;
  }
}

// 保存基础文本
const _origRefresh = refreshTimeline;
refreshTimeline = async function () {
  const sid = $('timelineSessionId').value.trim() || currentSessionId;
  if (!sid) { updateStatus('请先填写或创建会话ID'); return; }
  $('timelineSessionId').value = sid;
  const { ok, data } = await apiCall('GET', '/session/' + sid + '/timeline');
  if (!ok) return;
  const info = (await apiCall('GET', '/session/' + sid));
  let baseTxt = '';
  if (info.ok) {
    baseTxt = `会话 ${sid.slice(0, 8)}… · 当前失败 ${info.data.playerState?.failureCount || 0} · ${info.data.puzzles?.length || 0} 个谜题 · ${data.timeline.length} 条事件`;
  }
  const warnEl = $('timelineStats');
  warnEl.setAttribute('data-basetext', baseTxt);
  warnEl.textContent = baseTxt;
  renderTimeline(data.timeline || [], data.sessionId);
};

async function showTimelineEvent(eventId, el) {
  currentTimelineId = eventId;
  document.querySelectorAll('.tl-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  const sid = $('timelineSessionId').value.trim();
  const { ok, data } = await apiCall('GET', '/session/' + sid + '/timeline/' + eventId);
  if (!ok) return;
  renderTimelineEventDetail(data);
}

function renderTimelineEventDetail(ev) {
  const typeLabels = {
    session_created: '创建会话',
    puzzle_generated: '生成谜题',
    replay_requested: '请求重播',
    attempt_recorded: '答案尝试',
    failure_reported: '报告失败',
    player_state_updated: '玩家状态更新',
    session_reset: '重置会话',
  };

  const fc = ev.failureCount ?? ev.afterFailure ?? ev.failureCountAtGen ?? null;

  let html = `<div class="result-box"><div class="tag">${escHtml(ev.id.slice(0, 8))}</div>
    <div style="font-size:12px;margin-bottom:8px">
      <strong>${escHtml(typeLabels[ev.type] || ev.type)}</strong><br>
      <span style="color:#5a5a6e;font-size:10px">${escHtml(ev.timestamp)}</span>
    </div>`;

  if (fc != null) {
    const level = Math.min(3, Math.floor(fc / 2));
    const levelLabels = ['原始 (Lv0)', '微光 (Lv1)', '回声 (Lv2)', '余烬 (Lv3)'];
    html += `<div class="review-section"><div class="review-title">📊 失败次数 & 适配等级</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="stat-card" style="flex:1"><div class="stat-val">${fc}</div><div class="stat-label">失败次数</div></div>
        <div class="stat-card" style="flex:1"><div class="stat-val" style="color:#c090e0">Lv${level}</div><div class="stat-label">适配等级</div></div>
        <div class="stat-card" style="flex:2"><div class="stat-val" style="font-size:12px;color:#8ab4f8">${levelLabels[level]}</div><div class="stat-label">下次重播</div></div>
      </div>`;

    // 失败次数和适配等级一致性
    const snapLevel = ev.broadcastSnapshot?.adaptationLevel ?? ev.replayBroadcast?.adaptationLevel ?? ev.adaptationLevel;
    if (snapLevel != null && snapLevel !== level) {
      html += `<div class="consistency-warn">⚠ 适配等级不一致: 快照记录 Lv${snapLevel}，按失败次数推算 Lv${level}</div>`;
    } else if (snapLevel != null) {
      html += `<div style="margin-top:6px;font-size:10px;color:#70c090">✓ 适配等级一致 (快照 Lv${snapLevel} = 推算 Lv${level})</div>`;
    }
    html += '</div>';
  }

  const snap = ev.broadcastSnapshot || ev.replayBroadcast;
  if (snap) {
    html += `<div class="review-section"><div class="review-title">📻 当时广播</div>
      <div class="broadcast-text" style="background:#0a0a0f;padding:10px;border-left:2px solid #4a9eff;font-size:12px">${escHtml(snap.text || '')}</div></div>`;
    if (snap.clues?.length) {
      html += `<div class="review-section"><div class="review-title">🔍 当时线索</div>`;
      snap.clues.forEach(c => {
        html += `<div class="clue-item ${c.type || ''}">
          <div class="clue-type clue-${c.type || 'environmental'}">${c.type || ''}</div>
          <div>${escHtml(c.text || '')}</div></div>`;
      });
      html += '</div>';
    }
    html += `<div class="review-section"><div class="review-title">📶 适配等级</div>
      <div class="answer-box" style="color:#8ab4f8">Lv ${snap.adaptationLevel ?? 0} · ${escHtml(snap.adaptationName || '')}</div></div>`;
  }

  if (ev.type === 'attempt_recorded') {
    html += `<div class="review-section"><div class="review-title">🎯 验证结果</div>
      <div class="${ev.correct ? 'hook-text' : 'feedback-item'}" style="line-height:1.8">
        玩家输入: <code>${escHtml(JSON.stringify(ev.answer))}</code><br>
        结果: ${ev.correct ? '<span style="color:#70c090">✅ 正确</span>' : '<span style="color:#e07070">❌ 错误</span>'}<br>
        失败次数变化: ${ev.beforeFailure} → ${ev.afterFailure}
        ${ev.deltaFailure ? `<span class="fc-delta fc-up">+${ev.deltaFailure}</span>` : ''}
      </div></div>`;

    // 验证答案后失败次数一致性
    if (ev.beforeFailure != null && ev.afterFailure != null) {
      const expectedAfter = ev.correct ? ev.beforeFailure : ev.beforeFailure + (ev.deltaFailure || 1);
      if (ev.afterFailure !== expectedAfter) {
        html += `<div class="consistency-warn">⚠ 失败次数异常: ${ev.correct ? '正确' : '错误'} 应该 ${expectedAfter}, 实际 ${ev.afterFailure}</div>`;
      }
    }
  }

  if (ev.type === 'failure_reported') {
    html += `<div class="review-section"><div class="review-title">📊 失败次数变化</div>
      <div class="feedback-item">
        ${ev.beforeFailure} 次 → ${ev.afterFailure} 次 <span class="fc-delta fc-up">+${ev.delta}</span><br>
        触发原因: ${escHtml(ev.reason || 'manual')}
      </div></div>`;
  }

  // All fields dump
  html += `<div class="review-section"><div class="review-title">📋 完整数据</div>
    <pre style="background:#060610;padding:8px;font-size:10px;color:#6a6a7e;border-radius:2px;overflow:auto;max-height:300px">${escHtml(JSON.stringify(ev, null, 2))}</pre></div>`;

  html += '</div>';
  $('timelineEventDetail').innerHTML = html;
}
